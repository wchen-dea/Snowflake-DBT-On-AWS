# ============================================================
# spark-defaults.conf — shared Spark configuration
# ============================================================
# Picked up automatically by every Spark session/job.
# S3A settings point at MinIO in local mode; override with
# real AWS creds via env vars when running in cloud.
# ============================================================

# ── S3A / MinIO ────────────────────────────────────────────
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.path.style.access           true
spark.hadoop.fs.s3a.connection.ssl.enabled      false
# Credentials + endpoint are injected at runtime via env vars:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, S3_ENDPOINT

# ── Performance ────────────────────────────────────────────
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true
spark.sql.shuffle.partitions                    50

# ── Logging ────────────────────────────────────────────────
spark.eventLog.enabled                          false
